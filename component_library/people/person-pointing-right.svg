<svg xmlns="http://www.w3.org/2000/svg" width="80" height="120" viewBox="0 0 80 120">
  <!-- Flat design person pointing right - arm horizontal -->
  <!-- Head -->
  <circle cx="28" cy="16" r="12" fill="#FFCCBC"/>
  <!-- Hair -->
  <path d="M16 14 Q16 4 28 4 Q40 4 40 14 Z" fill="#5D4037"/>
  <!-- Body / Shirt -->
  <rect x="16" y="28" width="24" height="36" rx="4" fill="#1976D2"/>
  <!-- Left arm (at side) -->
  <rect x="6" y="30" width="10" height="28" rx="4" fill="#1976D2"/>
  <!-- Left hand -->
  <circle cx="11" cy="60" r="4" fill="#FFCCBC"/>
  <!-- Right arm (horizontal pointing) -->
  <rect x="40" y="34" width="30" height="9" rx="4" fill="#1976D2"/>
  <!-- Pointing hand (index finger shape) -->
  <polygon points="70,34 78,38 70,43" fill="#FFCCBC"/>
  <!-- Pants -->
  <rect x="16" y="64" width="10" height="36" rx="3" fill="#37474F"/>
  <rect x="30" y="64" width="10" height="36" rx="3" fill="#37474F"/>
  <!-- Shoes -->
  <rect x="14" y="100" width="14" height="8" rx="4" fill="#455A64"/>
  <rect x="28" y="100" width="14" height="8" rx="4" fill="#455A64"/>
</svg>
